<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVRANT</title>
  <meta name="description" content="RIVRANT is a creative production studio focused on cinematic visuals, culture-led storytelling, and high-end brand direction.">
  <link rel="stylesheet" href="style.css">
</head>
<body class="intro">
  <canvas id="particleOrbit"></canvas>  <div class="page-bg"></div>
  <div class="noise"></div>
  <div class="intro-container">
    <span class="eyebrow">Brand & Production</span>
    <h1>RIVRANT</h1>
    <a href="home.html" class="btn">Enter site</a>
  </div>
  <script>
const canvas = document.getElementById("particleOrbit");
const ctx = canvas.getContext("2d");

let particles = [];
let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}

window.addEventListener("resize", resize);
resize();

class Particle {
  constructor() {
    this.centerX = Math.random() * w;
    this.centerY = Math.random() * h;
    this.radius = 40 + Math.random() * 120;
    this.angle = Math.random() * Math.PI * 2;
    this.speed = 0.002 + Math.random() * 0.006;
    this.size = 1.5 + Math.random() * 3;
    this.color = [
      "rgba(255, 90, 120, 0.9)",
      "rgba(120, 160, 255, 0.9)",
      "rgba(255, 210, 120, 0.9)",
      "rgba(180, 120, 255, 0.9)"
    ][Math.floor(Math.random() * 4)];
  }

  update() {
    this.angle += this.speed;
    this.x = this.centerX + Math.cos(this.angle) * this.radius;
    this.y = this.centerY + Math.sin(this.angle) * this.radius * 0.55;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 18;
    ctx.shadowColor = this.color;
    ctx.fill();
  }
}

function init() {
  particles = [];
  const amount = window.innerWidth < 768 ? 35 : 75;

  for (let i = 0; i < amount; i++) {
    particles.push(new Particle());
  }
}

function connectParticles() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(255,255,255,${0.12 - distance / 1200})`;
        ctx.lineWidth = 0.6;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, w, h);

  particles.forEach(particle => {
    particle.update();
    particle.draw();
  });

  connectParticles();
  requestAnimationFrame(animate);
}

init();
animate();
</script></body>
</html>
