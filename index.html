<!DOCTYPE html>
<html>
<head>

    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 60px;
      margin: 0;
      letter-spacing: 2px;
    }

      border: none;
      background: white;
      color: black;
      cursor: pointer;

      border-radius: 5px;

    button:hover {
      background: #ddd;
