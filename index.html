<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVRANT</title>
  <meta name="description" content="RIVRANT is a creative production studio focused on cinematic visuals, culture-led storytelling, and high-end brand direction.">
  <link rel="stylesheet" href="style.css">
</head>
<body class="intro">
  <canvas id="particleOrbit"></canvas>
  <div class="page-bg"></div>
  <div class="noise"></div>

  <main class="intro-container">
    <span class="eyebrow">Brand &amp; Production</span>
    <h1>RIVRANT</h1>
    <a href="home.html" class="btn">Enter site</a>
  </main>

  <script>
const canvas = document.getElementById("particleOrbit");
const ctx = canvas.getContext("2d", { alpha: true });

let particles = [];
let w = 0;
let h = 0;
let dpr = Math.min(window.devicePixelRatio || 1, 2);
let animationFrame;
let resizeTimer;

const isMobile = () => window.matchMedia("(max-width: 768px)").matches;

function getViewport() {
  return {
    width: Math.max(1, document.documentElement.clientWidth || window.innerWidth),
    height: Math.max(1, window.innerHeight || document.documentElement.clientHeight)
  };
}

function resize(force = false) {
  const viewport = getViewport();
  const nextW = Math.round(viewport.width);
  const nextH = Math.round(viewport.height);

  // Prevent mobile browser-bar dragging from constantly rebuilding the animation.
  const tinyMobileHeightShift = isMobile() && nextW === w && Math.abs(nextH - h) < 90;
  if (!force && tinyMobileHeightShift) return;

  const oldW = w || nextW;
  const oldH = h || nextH;

  w = nextW;
  h = nextH;
  dpr = Math.min(window.devicePixelRatio || 1, 2);

  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  if (!particles.length || force) {
    init();
    return;
  }

  const scaleX = w / oldW;
  const scaleY = h / oldH;
  particles.forEach((particle) => {
    particle.x = Math.min(w - particle.size, Math.max(particle.size, particle.x * scaleX));
    particle.y = Math.min(h - particle.size, Math.max(particle.size, particle.y * scaleY));
  });
}

class Particle {
  constructor() {
    this.size = isMobile() ? 4 + Math.random() * 5.5 : 4.5 + Math.random() * 7.5;
    this.x = this.size + Math.random() * Math.max(1, w - this.size * 2);
    this.y = this.size + Math.random() * Math.max(1, h - this.size * 2);

    const speed = isMobile() ? 0.45 + Math.random() * 0.75 : 0.55 + Math.random() * 1.05;
    const angle = Math.random() * Math.PI * 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;

    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.018 + Math.random() * 0.025;

    const palette = [
      { core: "rgba(255,255,255,0.98)", glow: "rgba(255,255,255,0.14)", line: "rgba(255,255,255," },
      { core: "rgba(225,225,225,0.96)", glow: "rgba(245,245,245,0.11)", line: "rgba(230,230,230," },
      { core: "rgba(165,165,165,0.94)", glow: "rgba(210,210,210,0.09)", line: "rgba(205,205,205," },
      { core: "rgba(82,82,82,0.95)", glow: "rgba(255,255,255,0.07)", line: "rgba(170,170,170," },
      { core: "rgba(12,12,12,0.98)", glow: "rgba(255,255,255,0.08)", line: "rgba(135,135,135," }
    ];

    Object.assign(this, palette[Math.floor(Math.random() * palette.length)]);
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.pulse += this.pulseSpeed;

    if (this.x <= this.size) {
      this.x = this.size;
      this.vx *= -1;
    } else if (this.x >= w - this.size) {
      this.x = w - this.size;
      this.vx *= -1;
    }

    if (this.y <= this.size) {
      this.y = this.size;
      this.vy *= -1;
    } else if (this.y >= h - this.size) {
      this.y = h - this.size;
      this.vy *= -1;
    }
  }

  draw() {
    const pulseGlow = 1 + Math.sin(this.pulse) * 0.08;
    const glowRadius = this.size * (3.2 * pulseGlow);

    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowRadius);
    gradient.addColorStop(0, this.glow);
    gradient.addColorStop(0.28, this.glow);
    gradient.addColorStop(1, "rgba(255,255,255,0)");

    ctx.save();
    ctx.globalCompositeOperation = "screen";
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowRadius, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.shadowBlur = 8;
    ctx.shadowColor = "rgba(255,255,255,0.28)";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.core;
    ctx.fill();
    ctx.restore();
  }
}

function init() {
  particles = [];
  const amount = isMobile() ? 62 : 118;

  for (let i = 0; i < amount; i++) {
    particles.push(new Particle());
  }
}

function connectParticles() {
  const maxDistance = isMobile() ? 128 : 155;

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < maxDistance) {
        const opacity = Math.max(0, 0.10 - distance / 950);
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = particles[i].line + opacity + ")";
        ctx.lineWidth = 0.55;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, w, h);

  particles.forEach((particle) => {
    particle.update();
    particle.draw();
  });

  connectParticles();
  animationFrame = requestAnimationFrame(animate);
}

function queueResize(force = false) {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => resize(force), 120);
}

// Stop the index screen from rubber-band scrolling/glitching on mobile.
document.addEventListener("touchmove", (event) => event.preventDefault(), { passive: false });
window.addEventListener("resize", () => queueResize(false), { passive: true });
window.addEventListener("orientationchange", () => queueResize(true), { passive: true });

resize(true);
animate();
</script>
</body>
</html>
