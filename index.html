<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVRANT</title>
  <meta name="description" content="RIVRANT is a creative production studio focused on cinematic visuals, culture-led storytelling, and high-end brand direction.">
  <link rel="stylesheet" href="style.css">
</head>
<body class="intro">
  <canvas id="particleOrbit"></canvas>
  <div class="page-bg"></div>
  <div class="noise"></div>

  <main class="intro-container">
    <span class="eyebrow">Brand &amp; Production</span>
    <h1>RIVRANT</h1>
    <a href="home.html" class="btn">Enter site</a>
  </main>

  <script>
const canvas = document.getElementById("particleOrbit");
const ctx = canvas.getContext("2d");

let particles = [];
let w = 0;
let h = 0;
let dpr = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  w = window.innerWidth;
  h = window.innerHeight;
  dpr = Math.min(window.devicePixelRatio || 1, 2);

  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  init();
}

class Particle {
  constructor() {
    const clusterX = w / 2 + (Math.random() - 0.5) * w * 0.58;
    const clusterY = h / 2 + (Math.random() - 0.5) * h * 0.58;

    this.centerX = clusterX;
    this.centerY = clusterY;
    this.radiusX = 18 + Math.random() * 70;
    this.radiusY = 12 + Math.random() * 48;
    this.angle = Math.random() * Math.PI * 2;
    this.speed = 0.004 + Math.random() * 0.009;
    this.size = 3 + Math.random() * 5.5;
    this.drift = Math.random() * Math.PI * 2;

    this.color = [
      "rgba(255, 76, 118, 0.95)",
      "rgba(105, 145, 255, 0.95)",
      "rgba(255, 210, 116, 0.95)",
      "rgba(176, 105, 255, 0.95)",
      "rgba(95, 255, 220, 0.95)"
    ][Math.floor(Math.random() * 5)];
  }

  update() {
    this.angle += this.speed;
    this.drift += 0.003;

    const softDriftX = Math.cos(this.drift) * 10;
    const softDriftY = Math.sin(this.drift) * 8;

    this.x = this.centerX + Math.cos(this.angle) * this.radiusX + softDriftX;
    this.y = this.centerY + Math.sin(this.angle) * this.radiusY + softDriftY;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 30;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function init() {
  particles = [];
  const amount = w < 768 ? 85 : 160;

  for (let i = 0; i < amount; i++) {
    particles.push(new Particle());
  }
}

function connectParticles() {
  const maxDistance = w < 768 ? 145 : 170;

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < maxDistance) {
        const opacity = Math.max(0, 0.16 - distance / 1100);
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = "rgba(255,255,255," + opacity + ")";
        ctx.lineWidth = 0.7;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, w, h);

  particles.forEach((particle) => {
    particle.update();
    particle.draw();
  });

  connectParticles();
  requestAnimationFrame(animate);
}

window.addEventListener("resize", resize);
resize();
animate();
</script>
</body>
</html>
